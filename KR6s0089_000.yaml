front:
  text: 續大唐內典録讚序夫以大聖者體辨而長幽寂普霑動植同熟氣而登焉幽蔽而不光能異變而不養不謂親相歸於在相有道或藏嵯峨住於巖演登般若雙林虛空有六十萬億百千説涅槃會菩薩樂衆生者于時廣大盡城於在此國著於秦漢俄臨之會初存使賢僧白象驅連立域於帝京中道場念心乃翻聖迹石舍安然降曾多述仍廣度群萌難以盡算至於華香而設集大衆之流二十七譯雜增阿含等經凡為二十八譯良是前王後帝譯出民人之輩各變於斯新別前翻不譯相似不同者多或有是非交橫不失得部帙深大卷多言廣切轉者微薄成不登於崇誦力勞不盡有新不終實此之行實則鼓手腹心在也意淨云何齊身結誓敬登一經見得之教筆紙淨院語將初首以其大歌足沈吟衆會住院名僧盡宣律師執杖尋庠修行遊憶法師之意性若物不下茂愛識多解學集古今多能多才集句説演經等煩須讀廣億言一紙一顧顏容似華不飲兩端愛德三衣無著淨染棄時俗如棄洟不絶為懷輕綿帛如客塵未能留惜而所妙哉兩臂不偷卷聖圖筆不停操律建迹於總持寺之院東西修房實所留意畫像序讚一體不隱集遠無餘定秀每人前後相繼於賢難方卓異絶群是法師之曠度耳者也
