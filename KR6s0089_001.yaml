body:
  text: 若正於法名寶崇誠或有由賢是通俗法津之真海聖之高廣以歷於方如尊卑在日月明存道隆之美豈得不以凶我倒之筌蹄須證貧生之珍位者也自仙苑告就名水淨濟演字群品手說塵蒙隨機候而說謀由住性欲而見聲教網羅一絶統括大千受其道者也續代衆經傳譯盡隨近録第一部卷第一續代翻出經及人述作無非通法並入經收故隨經出續代譯經本單重人代見亡録第二部卷七謂前後異出人代不同又亂道俗波迸今總計會故有重單緣敘莫知致傳失續代衆經總撮入藏録第三部謂經部繁多或要備列從帙入藏以類相從故分大小續代衆經舉要誦說録第四謂尋在要博繁文辭義不非日時隨部撮簡而未自餘續代衆經有目或有闕本録第五謂統檢群録校其定本無隨方別出未能別顯目防之續代道俗述作注解録第六謂注述先聖之言用通未悟前後已別題續録若尋異解續代諸經支流陳化録第七謂別生經不譯入此續譯廣本且接初心一切並頌不可輕也續代歷出疑僞經論録第八謂正法深遠凡愚未達隨俗下化有勃真經所以續此録也續代衆經録目終始序第九謂經録不盡所續此録也續代衆經應感興敬録第十謂經東夏應感徵祥而有蒙祐增信故所以續此録續大唐內典録續代衆經傳譯所從録第一之初自教流東夏代涉帝朝必假時君弘傳聲略然後玄素依繕方開基構明后重其義方情在監護暗君順其倫軌相從而已故始自後漢爰洎惟唐世變澆淳宗猷莫二皆欽承至訓為滅結之元標體解玄圖鏡死生之本據故能傳度梵網代代滋彰斯即法施奔流時時不絶然則西番五竺祖尚天言東夏九州聿遵鳥迹故天書天語海縣之所絶思八體六文大夏由來罕覿致令昔聞重譯方見於斯然夫國史之與禮經質文互舉佛言之與俗典詞理天分何以知耶佛之布教說道為先開蒙解朴決疑去滯不在文華無存卷軸意在啓情理之昏明達神思之機敏斯其致也諦聽諦聽善思念之吾當為汝分別解說斯聖言也善哉善哉願樂欲聞唯願世尊分別解說斯受法也言重意得不慮煩拏但論正語莫敘文對斯本經也譯從方俗隨俗所傳多陷浮訛所失多矣所以道安著論五失易從彥琮屬詞八倒難及斯誠證也諸餘俗習不足涉言今録彼帝世翻譯賢明并顯時君信毀偏競以為初録且夫漢晉隋唐之運天下大同歲朔所臨法門一統魏宋齊梁等朝地分圮裂華夷參政翻傳並出至於廣部傳俗絶後超前即見敷揚聯輝惟遠今則隨其時代即而編之仍述道俗所撰附之於後庶將來同覩其若面焉都合一十八代續出衆經總有二千一百八十一部六千七百二十三卷續譯經三百六部後漢朝傳譯道俗一十二人所出經律等四百五十六部四百一十五卷續譯經一百二十五部新譯一百五十二卷前續魏朝傳譯僧八人續譯經律等一十一部二十七卷南唐孫氏傳譯道俗一十一人續出經傳等一百二十二部一百七十五卷續譯經一百五部二百七十卷西晉朝記譯經傳道俗九人續譯經戒律等三百五十部七百一十五卷續譯經一十部一十五卷前秦符氏譯律傳僧八人續經傳録等五十部三百二十卷秦乞伏氏傳譯僧二人所出經十二部二十七卷續譯經八部一十五卷前涼張氏傳譯僧九人所出經律二百部九百五十卷南涼漢孟氏傳譯道俗十一人出經傳五十二部二百七十卷續譯經五部一十八卷宋國朝傳譯道俗三十一人續出經傳三百二十部五百四十卷前齊朝傳譯道俗三十人所出經律傳六十部四百二十卷梁朝傳譯道俗二十五人所譯經律傳等八十七部九百二卷後魏元氏傳譯道俗一十四人所出經律傳七十九部三百六十八卷後齊高氏傳譯道俗三人所譯經論九部四十八卷後周宇文氏傳譯道俗二十人所譯經論天文等二十五部二百卷陳朝傳譯道俗五人所譯經論傳疏等六十部二百七十卷隋朝傳譯道俗等三十一人譯出經論等一百七十部七百卷皇朝傳譯僧等一十八人同譯經論等一百二十部一千七百二十一卷自教被神州時移九代朝分真僞土雜華夷所以五涼四燕三秦二趙夏蜀之居偏隘晉宋之據江陰經部翻傳隨方而出上列兼正之國取其傳譯所由自餘不言以無通法故也庶後之覽者知其致焉續大唐內典録後漢沙門迦葉摩滕一部一卷經沙門竺法蘭四部一十八卷沙門安清字世高一百七十八部一百九十七卷沙門支婁迦讖二十一部六十三卷優婆塞都尉安玄二部三卷經沙門竺佛朔二部三卷經沙門支曜一部十三卷經沙門康巨一部一卷經清信士嚴佛調七部九卷經沙門康孟詳六部九卷沙門釋曇果一部二卷經沙門竺大力一部二卷經諸失譯經一百二十五部一百四十八卷雜於經呪四十二章經一卷右一經後漢明帝世中天竺國婆羅門沙門迦葉摩滕所譯或云竺攝摩滕群録互存未詳孰是先來不譯故備敘之以永平十年隨漢使蔡愔東返至雒邑於白馬寺翻譯此經依録而編即是漢地之經祖也舊録云其經本是天竺經抄元出大部撮引要者似孝經十八章也道安録無出在舊録及士行漢録僧祐出三藏集記又載但大法初傳人少歸信使摩滕蘊其深解不復多翻後卒雒陽載其委曲備朱士行録及高僧傳諸雜録等寶唱録云竺法蘭所出者此或據其同來時耳佛本行雜經五卷十地斷結經四卷或八卷見朱士行録二百六十戒合異二卷見別録法海藏經一卷一本無藏字佛本生經一卷右五部合一十三卷是中天竺國沙門竺法蘭與迦葉摩滕同來間行後至在明帝世翻之初共滕出四十二章滕卒蘭自譯訖昔漢武穿昆明池底得灰墨問東方朔朔云非臣所知可問西域胡人法蘭既至追以問之蘭云此乃劫燒之遺灰也朔言有徵信者甚衆又秦景使還於月支國得優填王栴檀像師第四畫像樣來至雒陽帝敕圖之於西陽城門及顯節陵上供養自爾丹素流演于今又以佛法初至異道乖競遂敘時事著漢法本內傳五卷未詳作者今見在焉修行道地經六卷出支敏度録製序及寶唱録別録一云順道行經大僧威儀經四卷見別録新附異出不同祐録安譯分兩部二卷此別録合者是法句經四卷與威儀同見別録分二部禪行三十七品經一卷見寶唱録十報法經二卷祐録云一云多增道章經舊録云出長阿含陰持入經二卷別録云道安注解見朱士行漢録及祐録大安般守意經二卷道安云小安般見士行僧祐李廓録大安般經一卷道安注見僧祐録雜四十四篇經二卷或云雜經四十四篇既不顯名未知何經道安云出增一祐録大道地經二卷初出道安注是修行經抄無中國略本或無大字出長阿含見祐録道意發行經二卷長含或一卷見道安及祐録禪經二卷初出見別録無量壽經二卷初出見別録沙門曇鸞著論注解百六十品經一卷舊録云增一阿含百六十章經見祐録大十二門經一卷別録云二卷出長阿含道安注見唱祐二録小十二門經一卷出長含見唱祐二録七法經一卷舊録云阿毗曇七法行經出長含或直云七法行見祐録十四意經一卷舊録云菩薩十四意經見祐録阿毗曇九十八結經一卷見祐録明度五十校計經二卷見祐録難提迦羅越經一卷見祐録獨富長者經一卷一云獨富長者財物無付經一云無子付物經出雜含四十六卷長者惱二處經一云長者懊惱二處經一云二處惱經以下並單卷由起長者悔過經一云申越長者悔過供佛經由起申越未詳何者佛為那拘說根熟經一云為那拘羅長者說根熟經長者兄弟詣佛經一云長者利師達多兄弟二人往佛所經出中含佛神力救長者子經阿那邠邸化七子經出增一阿含十支居士八城人經出中阿含第六十無畏離車白阿難經出雜阿含二十一卷受呪願經一云最勝長者受呪願經長者子制經一名制經郁伽居士見佛聞法醒悟經一云修伽陀居士佛為說法得醒悟經出雜阿含經得非常觀經一加長者夜輸字舍頭諫經初出見舊録一云舍頭諫太子明二十八宿經一云太子明星二十八宿經一云虎耳經出家因緣經一加佛說字但云出家緣經佛度旃陀羅兒出家經純陀沙彌經或作沙門字出雜阿含二十四卷外道出家經精勤四念處經出雜含二十九卷父母恩難報經一云難報經出中含禪思滿足經出阿含數息事經禪法經禪祕要經出禪要祕治病經或無祕字世間言美色經出雜含二十四卷一切行不恆安住經出雜含三十四卷人受身入陰經出修行道地經初卷多倒見衆生經一無多字出出曜經第十六卷人身四百四病經出修行道地經初卷人病醫不能治經出修行地經分別善惡所起經斫毒樹復生經出出曜經禪定方便次第法經阿練若習禪法經出菩薩禪法第一四百三昧名經自誓三昧經內題云獨證品第四出比丘淨行中初出與護師出者小異琉璃王經初出出增一罵意經佛為頻頭婆羅門說像類經出雜含十一卷婆羅門問佛布施得福經佛為調馬聚落主說法經出雜含三十二卷婆羅門行經出中含三十九卷豆遮婆羅門論義出家經出雜含佛為事火婆羅門說法悟道經出雜含婆羅門虛僞經出雜含三十卷佛化大興婆羅門出家經出雜含一作火字佛為阿支羅迦葉說自他作苦經婆羅門子命終愛念不離經出增一含四吒婆羅門出家得道經出雜含佛為憍慢婆羅門說偈經婆羅門服白經出雜含婆羅門問佛將來有幾佛經出雜含婆羅門避死經出增一佛為婆羅門說耕田經出雜含七老婆羅門請為弟子經婆羅門通達論經出雜含佛覆裸形子經出生經婆羅門解知衆術經出雜含佛為婆羅門說四法經出雜含佛為年少婆羅門說善不善經如幻三昧經或二卷安般經內藏經元嘉二年十月第二譯一名內藏百品一名百寶見朱士行漢録五門禪要用法經初出水喻經出增含浮木譬喻經鱉喻經出六度集提婆達生身入地獄經出出曜經摩那祇女人誹謗佛生身入地獄經尸迦羅越六向拜經一名大六向拜經與法護出小異人本欲生經出長含道安注見祐録鬼問目連經地獄罪人衆苦經目連見衆生身毛如箭經出雜含摩訶衍精進度中罪報品經尊者薄拘羅經出中含阿難問事佛吉凶經一云阿難問事經一云事佛吉凶經迦旃延無常經出生經當來變滅經堅心正意經分明罪福經多增道章經金色女人經前世爭女經承事勝己經悔過法經舍利弗悔過經太子夢經小般泥洹經慈仁不殺經阿難同學經商人脫賊難經過去彈琴人經世間強盜布施經商人子作佛事經呪賊經卒逢賊結衣帶呪經梵天詣婆羅講堂經五陰成敗經八光經五鬪戰經五法經見僧祐録五行經三毒經良時難遇經求離牢獄經蓮華女人經孤母喪一子經昔有二人相愛敬經住陰持入經鏡面王經子命過經歎寶女經一名舍利弗歎寶女經說不思議經大迦葉遇尼揵子經正齊經阿那律思惟目連神力經舍利弗問寶女經月燈三昧經阿難惑經佛印三昧經迦葉詰阿難經一云迦葉責阿難雙度羅漢喻經初出大乘方等要慧經空淨天感應三昧經情離有罪經藥王藥上菩薩觀經義決律一卷一云義決律法行或云經者道安云出阿含見祐録四諦經與孟詳出小異道安云出長阿含經已前見祐録三十四部四十卷餘雜出附見寶積三昧文殊問法身經法受塵經禪行法想經阿含正行經犍陀國王經佛說處處經十八泥犁經罪業報應教化地獄經犯戒罪報輕重經聞成十二因緣經本相倚致經普法義經摩鄧女經漏分布經是法非法經聞成十二因緣經一卷右出別録與世高譯小異墮落優婆塞經二卷小道地經一卷阿那律八念經二卷大摩耶經一卷馬有三相經二卷右一十一部西域沙門支曜以靈帝世於雒陽譯問地獄事經一卷右一經一卷中國沙門康巨以靈帝中平四年於雒陽譯並言直旨詣不加潤飾古維摩詰經二卷濡首菩薩無上清淨分衛經二卷思意經二卷慧上菩薩問大善權經二卷內六波羅蜜經二卷十慧經二卷迦葉詰阿難經一卷右出別録梵網經二卷右出別録中本起經二卷右出雜録興起行經二卷右或名十緣見吳録四諦經一卷右出吳録修行本起經二卷右一經二卷出雜録胡本經四卷右出吳録泥洹後千歲中變記經四卷右出別録合道神足經二卷右一名極變經諸經佛名二卷右一名佛名經舊譬喻經二卷右或名譬喻經觀無量壽經一卷右出單經龍種尊國變化經二卷右出別録佛見牧牛煮道經一卷三千佛名經五十三佛名經南方佛名經一名治城寺經滅罪得福經觀世音所說行法經彌勒為女身經寂調意所問經薩陀波崙菩薩求深般若圖紀經菩薩生地經初發意菩薩常晝夜六時行道經一切流攝守因緣經七處三觀經九橫經出雜含經八正道經五陰譬喻經轉法輪經思惟要略經請賓頭盧法阿含口解十二因緣經阿毗曇五法行經大集經二十七卷道行般若波羅蜜經十卷初出名摩訶般若波羅蜜經或八卷一名波羅蜜般若道行品經出支敏度及祐録首楞嚴經二卷右後漢中平三年二月八日初出見士行祐二録吳録云三卷無量清淨經二卷右吳録與帛延出者異本一云無量清淨平等覺經阿閦佛國經二卷右一名阿閦佛剎菩薩學成經一名阿閦佛經一卷孛本經二卷右出僧祐録般舟三昧經二卷右光和二年初出見聶道真及吳祐等三録舊云大般舟三昧經屯真陀羅所問經二卷右初出舊録云屯真陀羅尼王經阿闍世王經二卷右初出道安云出長含經佛遺日摩尼寶經一卷右出方等部經一名摩訶衍經大寶積經二卷右尋此經與前略同以光和二年初出道安云摩尼寶經或二卷見舊録及士行漢録文殊師利問署經二卷右一名問署經道安云出方等部見吳録內藏百寶經十卷右內藏百寶經第一出與世高譯少異道安云出方等胡般泥洹經八卷右初出或六卷出漢録阿闍世王問五逆經二卷又直云阿闍世王經大方便報恩經七卷右見吳録光明三昧經一卷右安録無見吳録及三藏記禪經二卷右見別録雜譬喻經二卷右凡十事祐云失譯今總見別録故載之阿育王太子壞目因緣經七卷右佛滅後一百三十年育王方出故非佛出兜沙經二卷右在別録法鏡經二卷右或一卷唐續僧會阿含口解十二因緣經右出斷十二因緣中般舟三昧經二卷右録云大般舟三昧經一卷第二出見高僧傳道行經二卷右嘉平元年譯出續大唐內典録道安云是般若抄小本起經二卷右修行本起經云宿行近來別録在高僧傳成具光明定意經四卷右僧祐録云馬有八態譬人經一卷右八弊經出僧祐録賴吒和羅經一卷右初出道安云出方等部首至問佛十四事經二卷右出高僧傳右中本起經亦是沙門曇果於迦維羅衛國得此梵本於雒陽以建安十二年翻孟詳度語見始興録及長房録余以詳公所譯與前無異故兩別來由耳
